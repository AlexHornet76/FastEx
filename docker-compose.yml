version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exchangeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-exchangedb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount migrations into postgres container for manual runs
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - fastex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exchangeuser} -d ${POSTGRES_DB:-exchangedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-exchangeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-exchangedb}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-minimum-32-characters-long}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-15}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CHALLENGE_TTL_MINUTES: ${CHALLENGE_TTL_MINUTES:-5}
      MATCHING_ENGINE_URL: ${MATCHING_ENGINE_URL:-http://engine:8081}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fastex
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  engine:  
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: engine
    ports:
      - "8081:8081"
    environment:
      MATCHING_ENGINE_PORT: "8081"
      INSTRUMENTS: "BTC,AAPL,GOOGL,EETH"
      WAL_DIR: "/app/data/wal"
      LOG_LEVEL: info
    volumes:
      - engine_data:/app/data
    networks:
      - fastex
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  engine_data:

networks:
  fastex:
    driver: bridge