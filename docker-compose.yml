version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exchangeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-exchangedb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount migrations into postgres container for manual runs
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - fastex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exchangeuser} -d ${POSTGRES_DB:-exchangedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-exchangeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-exchangedb}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-minimum-32-characters-long}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-15}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CHALLENGE_TTL_MINUTES: ${CHALLENGE_TTL_MINUTES:-5}
      MATCHING_ENGINE_URL: ${MATCHING_ENGINE_URL:-http://engine:8081}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fastex
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  engine:  
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: engine
    ports:
      - "8081:8081"
    environment:
      MATCHING_ENGINE_PORT: "8081"
      INSTRUMENTS: "BTC,AAPL,GOOGL,EETH"
      WAL_DIR: "/app/data/wal"
      LOG_LEVEL: info
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: "kafka:9092"
    volumes:
      - engine_data:/app/data
    networks:
      - fastex
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    ports:
      - "2181:2181"
    networks:
      - fastex

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      # topic defaults (fine for dev)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    
    networks:
      - fastex

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - kafka
    networks:
      - fastex
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      echo 'Waiting for Kafka...';
      cub kafka-ready -b kafka:9092 1 30;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order.placed --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic trade.executed --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order.canceled --partitions 3 --replication-factor 1;
      echo 'Kafka topics ensured.';
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "fastex"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    networks:
      - fastex
    
      
volumes:
  postgres_data:
  engine_data:

networks:
  fastex:
    driver: bridge