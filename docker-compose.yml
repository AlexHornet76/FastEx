version: '3.9'

services:
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: ${POSTGRES_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - fastex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ${GATEWAY_CONTAINER_NAME}
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL}
      CHALLENGE_TTL_MINUTES: ${CHALLENGE_TTL_MINUTES}
      MATCHING_ENGINE_URL: ${MATCHING_ENGINE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fastex
    restart: ${GATEWAY_RESTART_POLICY}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: ${GATEWAY_HEALTHCHECK_INTERVAL}
      timeout: ${GATEWAY_HEALTHCHECK_TIMEOUT}
      retries: ${GATEWAY_HEALTHCHECK_RETRIES}
  
  engine:  
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: ${ENGINE_CONTAINER_NAME}
    ports:
      - "${MATCHING_ENGINE_PORT}:8081"
    environment:
      MATCHING_ENGINE_PORT: ${MATCHING_ENGINE_PORT}
      INSTRUMENTS: ${INSTRUMENTS}
      WAL_DIR: ${WAL_DIR}
      LOG_LEVEL: ${LOG_LEVEL}
      KAFKA_ENABLED: ${KAFKA_ENABLED}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    volumes:
      - engine_data:/app/data
    networks:
      - fastex
    restart: ${ENGINE_RESTART_POLICY}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: ${ENGINE_HEALTHCHECK_INTERVAL}
      timeout: ${ENGINE_HEALTHCHECK_TIMEOUT}
      retries: ${ENGINE_HEALTHCHECK_RETRIES}

  zookeeper:
    image: ${ZOOKEEPER_IMAGE}
    container_name: ${ZOOKEEPER_CONTAINER_NAME}
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:2181"
    networks:
      - fastex

  kafka:
    image: ${KAFKA_IMAGE}
    container_name: ${KAFKA_CONTAINER_NAME}
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_INTERNAL_PORT}:9092"
      - "${KAFKA_EXTERNAL_PORT}:29092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - fastex

  kafka-init:
    image: ${KAFKA_IMAGE}
    depends_on:
      - kafka
    networks:
      - fastex
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      echo 'Waiting for Kafka...';
      cub kafka-ready -b ${KAFKA_BROKERS} 1 30;
      kafka-topics --bootstrap-server ${KAFKA_BROKERS} --create --if-not-exists --topic ${KAFKA_TOPIC_ORDER_PLACED} --partitions ${KAFKA_TOPIC_PARTITIONS} --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BROKERS} --create --if-not-exists --topic ${KAFKA_TOPIC_TRADE_EXECUTED} --partitions ${KAFKA_TOPIC_PARTITIONS} --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BROKERS} --create --if-not-exists --topic ${KAFKA_TOPIC_ORDER_CANCELED} --partitions ${KAFKA_TOPIC_PARTITIONS} --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR};
      echo 'Kafka topics ensured.';
      "

  kafka-ui:
    image: ${KAFKA_UI_IMAGE}
    container_name: ${KAFKA_UI_CONTAINER_NAME}
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTER_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BROKERS}
    networks:
      - fastex

  settlement:
    build:
      context: ./settlement
      dockerfile: Dockerfile
    container_name: settlement
    ports:
      - "${SETTLEMENT_PORT}:8090"
    environment:
      LOG_LEVEL: ${LOG_LEVEL}

      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE}

      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC_TRADE_EXECUTED}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID}

      SETTLEMENT_PORT: ${SETTLEMENT_PORT}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - fastex
    restart: on-failure

  marketdata:
    build:
      context: ./marketdata
      dockerfile: Dockerfile
    container_name: marketdata
    ports:
      - "${MARKETDATA_PORT}:${MARKETDATA_PORT}"
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      MARKETDATA_PORT: ${MARKETDATA_PORT}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC_TRADE_EXECUTED}
      KAFKA_GROUP_ID: ${MARKETDATA_KAFKA_GROUP_ID}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - fastex
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "${MARKETDATA_HEALTHCHECK_URL}"]
      interval: 30s
      timeout: 10s
      retries: 3
    
      
volumes:
  postgres_data:
  engine_data:

networks:
  fastex:
    driver: bridge